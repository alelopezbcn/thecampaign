name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Check formatting
        run: |
          unformatted=$(find ./backend -name '*.go' -not -path '*/vendor/*' | xargs gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted (run gofmt):"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: make test
