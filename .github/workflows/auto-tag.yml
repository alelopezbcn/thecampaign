name: Auto Tag and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    # Definimos el output para que el job de deploy pueda leerlo
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump patch
        id: bump
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$latest" ]; then
            tag="v1.0.0"
          else
            major=$(echo "$latest" | cut -d. -f1)
            minor=$(echo "$latest" | cut -d. -f2)
            patch=$(echo "$latest" | cut -d. -f3)
            new_patch=$((patch + 1))
            tag="${major}.${minor}.${new_patch}"
          fi
          echo "new_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            alelopezcop/thecampaign:${{ steps.bump.outputs.new_tag }}
            alelopezcop/thecampaign:latest
          build-args: |
            VERSION=${{ steps.bump.outputs.new_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Bajar la imagen específica que acabamos de crear
            docker pull alelopezcop/thecampaign:${{ needs.tag.outputs.new_tag }}
            
            # 2. Detener el contenedor actual
            docker stop thecampaign-container || true
            docker rm thecampaign-container || true
            
            # 3. Correr el nuevo (Mapeo 80 del EC2 -> 8080 del contenedor)
            # Si quieres entrar por el puerto 8080 desde fuera, cambia a -p 8080:8080
            docker run -d \
              --name thecampaign-container \
              --restart always \
              -p 8080:8080 \
              alelopezcop/thecampaign:${{ needs.tag.outputs.new_tag }}
            
            # 4. Limpieza
            docker image prune -f